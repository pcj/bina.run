<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Easter from the Money Bunny 🐰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #FFD6E8;
    --mint: #D4F1E0;
    --lavender: #E8D5F2;
    --butter: #FFF4C2;
    --text: #5C4A6E;
    --accent: #FF8FB8;
  }

  html, body { min-height: 100%; }

  body {
    font-family: 'Fredoka', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background: linear-gradient(135deg, var(--pink) 0%, var(--butter) 25%, var(--mint) 55%, var(--lavender) 100%);
    background-attachment: fixed;
    min-height: 100vh;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }

  .egg {
    position: fixed;
    font-size: 2.4rem;
    opacity: 0.45;
    animation: float 9s ease-in-out infinite;
    pointer-events: none;
    user-select: none;
    z-index: 0;
  }
  .egg:nth-child(1) { top: 6%; left: 4%; }
  .egg:nth-child(2) { top: 14%; right: 6%; animation-delay: 1.2s; font-size: 2.8rem; }
  .egg:nth-child(3) { bottom: 10%; left: 6%; animation-delay: 2.4s; font-size: 2.6rem; }
  .egg:nth-child(4) { bottom: 24%; right: 5%; animation-delay: 3.6s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-6deg); }
    50% { transform: translateY(-20px) rotate(6deg); }
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding: 2rem 1rem;
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 28px;
    border: 2px solid rgba(255, 255, 255, 0.8);
    box-shadow: 0 12px 40px rgba(92, 74, 110, 0.12);
  }

  h1 {
    font-weight: 700;
    font-size: clamp(1.6rem, 5vw, 2.6rem);
    letter-spacing: 0.5px;
  }

  .subtitle {
    font-weight: 400;
    font-size: clamp(0.95rem, 2.5vw, 1.1rem);
    margin-top: 0.75rem;
    opacity: 0.85;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.25rem;
    margin-bottom: 3rem;
  }

  .gallery-item {
    position: relative;
    aspect-ratio: 4 / 3;
    border-radius: 22px;
    overflow: hidden;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.5);
    border: 3px solid rgba(255, 255, 255, 0.85);
    box-shadow: 0 8px 24px rgba(92, 74, 110, 0.15);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .gallery-item:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 14px 32px rgba(92, 74, 110, 0.25);
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem 1rem;
    font-size: 1.1rem;
    opacity: 0.7;
    background: rgba(255, 255, 255, 0.55);
    border-radius: 22px;
    border: 2px dashed rgba(92, 74, 110, 0.25);
  }

  footer {
    text-align: center;
    padding: 2rem 1.5rem;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 28px;
    border: 2px solid rgba(255, 255, 255, 0.9);
    box-shadow: 0 12px 40px rgba(92, 74, 110, 0.12);
    font-size: clamp(1rem, 2.8vw, 1.25rem);
    font-weight: 500;
    line-height: 1.6;
  }

  footer .names { color: var(--accent); font-weight: 700; }
  footer .signoff { display: block; margin-top: 0.75rem; font-size: 0.95em; opacity: 0.85; }

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(92, 74, 110, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    z-index: 100;
    cursor: zoom-out;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 100%;
    max-height: 90vh;
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
  }
  .lightbox-close {
    position: absolute;
    top: 1rem;
    right: 1.25rem;
    background: rgba(255, 255, 255, 0.9);
    color: var(--text);
    border: none;
    border-radius: 50%;
    width: 2.5rem;
    height: 2.5rem;
    font-size: 1.3rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
  <span class="egg">🐰</span>
  <span class="egg">🥚</span>
  <span class="egg">🌷</span>
  <span class="egg">🐣</span>

  <div class="container">
    <header>
      <h1>🐰 Happy Easter from the Money Bunny 🥕</h1>
      <p class="subtitle">Follow the clues to find the final prize!</p>
    </header>

    <div class="gallery" id="gallery"></div>

    <footer>
      Happy Easter <span class="names">Kaitek, Helena, and Margaux</span>.<br>
      We love you so much!
      <span class="signoff">— Mom and Dad 💕</span>
    </footer>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" aria-label="Close">✕</button>
    <img id="lightbox-img" src="" alt="">
  </div>

<script>
  const gallery = document.getElementById('gallery');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  fetch('images.json')
    .then(r => r.json())
    .then(list => {
      if (!list || list.length === 0) {
        gallery.innerHTML = '<div class="empty-state">🥚 The Money Bunny is still hiding the clues... check back soon! 🐰</div>';
        return;
      }
      list.forEach((name, i) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        const img = document.createElement('img');
        img.src = 'images/' + name;
        img.alt = 'Clue ' + (i + 1);
        img.loading = 'lazy';
        item.appendChild(img);
        item.addEventListener('click', () => {
          lightboxImg.src = img.src;
          lightboxImg.alt = img.alt;
          lightbox.classList.add('open');
        });
        gallery.appendChild(item);
      });
    })
    .catch(() => {
      gallery.innerHTML = '<div class="empty-state">🥚 The Money Bunny is still hiding the clues... check back soon! 🐰</div>';
    });

  lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') lightbox.classList.remove('open');
  });
</script>
</body>
</html>
